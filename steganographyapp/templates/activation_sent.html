{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Check Your Email | Steganography Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, #1a102f, #07010f 75%);
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .verify-card {
            width: 100%;
            max-width: 560px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(187, 134, 252, 0.22);
            border-radius: 26px;
            padding: 45px;
            text-align: center;
            backdrop-filter: blur(16px);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
        }

        .icon-circle {
            width: 82px;
            height: 82px;
            border-radius: 50%;
            margin: 0 auto 24px;
            background: rgba(215, 179, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d7b3ff;
            font-size: 34px;
        }

        h1 {
            font-weight: 800;
            margin-bottom: 15px;
        }

        p {
            color: #bcbcbc;
            line-height: 1.7;
        }

        .btn-main {
            background: linear-gradient(135deg, #8b5cf6, #ff4ecd);
            border: none;
            color: white;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
            margin-top: 18px;
        }

        .btn-main:hover {
            color: white;
        }
    </style>
</head>
<body>

<div class="verify-card">
    <div class="icon-circle">
        <i class="fa-solid fa-envelope-circle-check"></i>
    </div>

    <h1>Check Your Email</h1>

    <p>
        We have sent an activation link to your email address.
        Please open your inbox and click the confirmation link to activate your account.
    </p>

    <p>
        After activation, you will be redirected back to the website.
    </p>

    <a href="{% url 'home' %}" class="btn-main">
        Back to Home
    </a>
</div>

</body>
</html>
